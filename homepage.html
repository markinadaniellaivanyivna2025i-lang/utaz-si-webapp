<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage Utazási weblap</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="py-3">
        <div class="container">
            <div class="row">
                <div class="col-lg-5">
                    <p class="fw-bold fs-2">TravelApp</p>
                </div>
                <div class="col-lg-7 fw-bold">
                    <nav class="text-center">
                        <ul>
                            <li><a href="" title="Home" class="ps-5 text-uppercase">Home</a></li>
                            <li><a href="" title="Destinations" class="px-3">Destinations</a></li>
                            <li><a href="" title="Weather" class="pe-5">Weather</a></li>
                            <button type="button" class="btn btn-dark rounded-5">Book Now</button>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="bg-body-secondary text-center py-5 fw-bold">
            <div class="container">
                <h1>Find your next trip</h1>
                <p>Check the weather before you go.</p>
                <div class="row pt-5">
                    <div class="col-lg-4">
                        <p><i class="bi bi-map fs-1"></i></p>
                        <p>Local Expertise</p>
                    </div>
                    <div class="col-lg-4">
                        <p><i class="bi bi-calendar4-week fs-1"></i></p>
                        <p>All-in-One Booking</p>
                    </div>
                    <div class="col-lg-4">
                        <p><i class="bi bi-headset fs-1"></i></p>
                        <p>24/7 Support</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="py-5">
            <div class="container">
                <h2 class="fs-1 text-center h2">Top Destinations</h2>
                <div class="row">
                    <div class="col-lg-4"></div>
                    <div class="col-lg-4"></div>
                    <div class="col-lg-4"></div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-dark-subtle py-3 text-center">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <p>2026 TravelApp <br>Plan your trip. Check the weather. Enjoy your journey. <br>All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
